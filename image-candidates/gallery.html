<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Icon Candidates</title>
<style>
  body { background: #0d1b2e; color: #dce6f5; font-family: system-ui, sans-serif; padding: 2rem; }
  h2 { margin-top: 3rem; font-weight: 600; letter-spacing: 0.02em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }
  figure { margin: 0; }
  img { width: 100%; border-radius: 8px; border: 1px solid #2a3f5f; display: block; }
  figcaption { font-family: monospace; font-size: 0.85rem; margin-top: 0.5rem; color: #8fa8c9; }
</style>
</head>
<body>
<h1>Icon Candidates</h1>

<div class="grid">

  <figure><img src="diffusion-cat-2.png"><figcaption>diffusion-cat-2.png — cartoon cat, white (sharpest)</figcaption></figure>
  <figure><img src="diffusion-cat-3.png"><figcaption>diffusion-cat-3.png — cartoon kitten, chibi</figcaption></figure>
  <figure><img src="diffusion-persp-1.png"><figcaption>diffusion-persp-1.png — perspective panels</figcaption></figure>
