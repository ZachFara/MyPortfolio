        - heading "Agentic Memory from Llama Index" [level=1] [ref=f15e15]
        - paragraph [ref=f15e16]: How To Turn Theory Into A Practical Stack
        - img "Illustration of agent memory systems showing short-term and long-term memory components" [ref=f15e18]
        - generic [ref=f15e20]: Created on May 30, 2025
        - generic [ref=f15e21]:
          - generic [ref=f15e22]: "#AI"
          - generic [ref=f15e23]: "#LlamaIndex"
          - generic [ref=f15e24]: "#Agents"
          - generic [ref=f15e25]: "#Memory"
      - generic [ref=f15e26]:
        - heading "How to Structure Memory" [level=2] [ref=f15e27]
        - paragraph [ref=f15e28]:
          - text: As I argued in my earlier post on
          - link "AI Agents" [ref=f15e29] [cursor=pointer]:
            - /url: /blog/whyagents
          - text: ", memory is the difference between a clever one‑off response and a system that actually learns you: your preferences, your past asks, which tools worked (and which didn't). For the high-level theory, see Duncan Calvert's"
          - link "\"AI Agent Memory\"" [ref=f15e30] [cursor=pointer]:
            - /url: https://duncancalvert.github.io/blog/2025/ai_agent_memory/
          - text: ". Here, we'll stay pragmatic: short‑term vs. long‑term memory and how LlamaIndex operationalizes both with a clean, composable API."
        - paragraph [ref=f15e31]:
          - text: Short‑term memory (STM) is the rolling context that keeps the model coherent right now. Long‑term memory (LTM) is slimmer, curated, and retrieved only when relevant. Something must decide what to keep, how to compress it, and when to bring it back. LlamaIndex's
          - code [ref=f15e32]: Memory
          - text: object plus specialized memory blocks give you exactly that.
        - separator [ref=f15e33]
        - heading "Memory" [level=2] [ref=f15e34]
        - paragraph [ref=f15e35]:
          - text: In LlamaIndex,
          - code [ref=f15e36]: Memory
          - text: is the orchestrator. It owns the plain‑text rolling chat buffer and automatically flushes overflowed tokens into long‑term memory blocks once you exceed a global
          - code [ref=f15e37]: token_limit
          - text: . If you don't attach any blocks, those tokens are simply dropped. You tune the short‑term buffer's protection with
          - code [ref=f15e38]: chat_history_token_ratio
          - text: (e.g., 0.7 to reserve 70% of the context for the live chat) and set
          - code [ref=f15e39]: token_flush_size
          - text: to control how many tokens get evicted at a time. Conversations are isolated under a
          - code [ref=f15e40]: session_id
          - text: ", and you can persist memory by pointing"
          - code [ref=f15e41]: async_database_uri
          - text: to a real database (instead of the default in‑memory SQLite). At inference time,
          - code [ref=f15e42]: Memory
          - text: reassembles the prompt by merging the short‑term buffer with whatever long‑term content still fits under
          - code [ref=f15e43]: token_limit
          - text: ", injected via your chosen"
          - code [ref=f15e44]: insert_method
          - text: (commonly
          - code [ref=f15e45]: "\"system\""
          - text: "). Conceptually:"
          - code [ref=f15e46]: memory.put()
          - text: logs new events;
          - code [ref=f15e47]: memory.get()
          - text: returns the token‑bounded context the model will actually see.
        - separator [ref=f15e48]
        - heading "StaticMemoryBlock" [level=2] [ref=f15e49]
        - paragraph [ref=f15e50]:
          - code [ref=f15e51]: StaticMemoryBlock
          - text: "is your non‑negotiable, always‑on context: agent identity, safety policies, core constraints, or stable user profile facts. It never retrieves, ranks, or summarizes; it always gets appended to the LLM context on every call. You typically set"
          - code [ref=f15e52]: priority=0
          - text: ", which effectively says: \"don't ever truncate this.\" It's cheap, deterministic, and perfect for what you'd otherwise hard‑code into a system prompt."
        - separator [ref=f15e53]
        - heading "FactExtractionMemoryBlock" [level=2] [ref=f15e54]
        - paragraph [ref=f15e55]:
          - code [ref=f15e56]: FactExtractionMemoryBlock
          - text: converts long chats into durable, compact facts. When short‑term memory overflows, this block asks an LLM (
          - code [ref=f15e57]: llm
          - text: ") to extract salient information: preferences, decisions, constraints, key entities, up to"
          - code [ref=f15e58]: max_facts
          - text: ". If it overgrows, it summarizes itself to stay tight. The result is a lightweight, always‑useful layer you can inject almost every turn. The cost: extra LLM calls and lossy compression. In practice, give it"
          - code [ref=f15e59]: priority=1
          - text: ", so it nearly always survives truncation right after your static policy block."
        - separator [ref=f15e60]
        - heading "VectorMemoryBlock" [level=2] [ref=f15e61]
        - paragraph [ref=f15e62]:
          - code [ref=f15e63]: VectorMemoryBlock
          - text: is your semantic recall layer. Flushed messages are embedded (
          - code [ref=f15e64]: embed_model
          - text: ) and written to a vector store (
          - code [ref=f15e65]: vector_store
          - text: ). On each step, it can pull back the most relevant past snippets (
          - code [ref=f15e66]: similarity_top_k
          - text: ","
          - code [ref=f15e67]: retrieval_context_window
          - text: ) and optionally post‑process them. This is ideal when you need to reach way back ("remember that Athena query we debugged last month?") or when you want verbatim, auditable recovery. Because retrieved spans can be token‑heavy, assign it a lower priority (e.g.,
          - code [ref=f15e68]: priority=2+
          - text: ) so it's trimmed first when the context gets tight.
        - separator [ref=f15e69]
        - heading "Priority" [level=2] [ref=f15e70]
        - paragraph [ref=f15e71]:
          - text: The
          - code [ref=f15e72]: priority
          - text: "you assign to each block defines your degradation path under strict token budgets. A production‑ready default:"
        - list [ref=f15e73]:
          - listitem [ref=f15e74]:
            - code [ref=f15e75]: StaticMemoryBlock
            - text: (
            - code [ref=f15e76]: priority=0
            - text: "): identity/rules must never drop."
          - listitem [ref=f15e77]:
            - code [ref=f15e78]: FactExtractionMemoryBlock
            - text: (
            - code [ref=f15e79]: priority=1
            - text: "): distilled, low‑cost facts that almost always help."
          - listitem [ref=f15e80]:
            - code [ref=f15e81]: VectorMemoryBlock
            - text: (
            - code [ref=f15e82]: priority=2+
            - text: "): deep semantic recall included only when there's space or clear relevance."
        - paragraph [ref=f15e83]:
          - text: "This mirrors the theory: guarantee invariant context, keep a compact evergreen factual spine, and fall back to heavy semantic retrieval when necessary. Need something bespoke (scores, counters, domain state)? Subclass"
          - code [ref=f15e84]: BaseMemoryBlock
          - text: and
          - code [ref=f15e85]: Memory
          - text: will still flush, retrieve, and truncate it under the same rules.
        - separator [ref=f15e86]
        - heading "Best Practices" [level=2] [ref=f15e87]
        - paragraph [ref=f15e88]:
          - text: Adopt the three‑layer stack with explicit priorities. Set a strict
          - code [ref=f15e89]: token_limit
          - text: ", keep"
          - code [ref=f15e90]: chat_history_token_ratio
          - text: high enough for live turns, and flush in coherent chunks (
          - code [ref=f15e91]: token_flush_size
          - text: ) so long‑term blocks receive meaningful spans. Bound
          - code [ref=f15e92]: max_facts
          - text: so facts stay cheap to inject; tighten
          - code [ref=f15e93]: similarity_top_k
          - text: /
          - code [ref=f15e94]: retrieval_context_window
          - text: to keep vector recalls lean. Use separate
          - code [ref=f15e95]: session_id
          - text: s and a persistent
          - code [ref=f15e96]: async_database_uri
          - text: when you need continuity beyond process restarts. Prefer
          - code [ref=f15e97]: insert_method="system"
          - text: for clean, deterministic prompt injection.
        - code [ref=f15e100]: from llama_index.core.memory import ( Memory, StaticMemoryBlock, FactExtractionMemoryBlock, VectorMemoryBlock, ) blocks = [ StaticMemoryBlock( name="core_identity", static_content="You are Atlas, a finance agent. Always be precise, cite data, no hallucinations.", priority=0, ), FactExtractionMemoryBlock( name="facts", llm=llm, max_facts=100, priority=1, ), VectorMemoryBlock( name="ltm_vec", vector_store=vector_store, embed_model=embed_model, priority=2, similarity_top_k=3, retrieval_context_window=5, ), ] memory = Memory.from_defaults( session_id="user-123", token_limit=32_000, chat_history_token_ratio=0.7, token_flush_size=2_000, memory_blocks=blocks, insert_method="system", ) response = await agent.run(user_msg, memory=memory)
        - heading "Conclusion" [level=2] [ref=f15e101]
        - paragraph [ref=f15e102]:
          - text: Memory is what turns a clever LLM into a situated agent. LlamaIndex's
          - code [ref=f15e103]: Memory
          - text: orchestrator plus a layered stack of
          - code [ref=f15e104]: StaticMemoryBlock (0)
          - text: for invariants,
          - code [ref=f15e105]: FactExtractionMemoryBlock (1)
          - text: for compact durable facts, and
          - code [ref=f15e106]: VectorMemoryBlock (2)
          - text: for deep semantic recall maps cleanly onto short‑ vs. long‑term memory theory while staying within strict token limits. Priorities give you a predictable degradation path; knobs like
          - code [ref=f15e107]: token_limit
          - text: ","
          - code [ref=f15e108]: chat_history_token_ratio
          - text: ", and"
          - code [ref=f15e109]: token_flush_size
          - text: keep prompts lean. Start with the three‑block baseline, measure token pressure and retrieval usefulness, and only customize where your workload proves it's needed. The payoff is an agent that remembers what matters, forgets what doesn't, and scales its recall gracefully as conversations (and stakes) grow.
        - paragraph [ref=f15e111]:
